<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araliya Supermarket | Fresh Food & Groceries</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
:root{
  --red:#d32f2f;
  --red-dark:#b71c1c;
  --dark:#1a1a2e;
  --white:#fff;
  --bg:#f8fafc;
  --muted:#64748b;
  --border:#edf2f7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(rgba(248,250,252,0.94),rgba(248,250,252,0.94)),
  url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=1600');
  background-size:cover;
  background-attachment:fixed;
  color:#111827;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* NAVBAR */
.navbar{
  background:white;
  padding:16px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
  flex-wrap:wrap;
  gap:15px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo i{
  background:var(--red);
  color:white;
  width:45px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
  font-size:1.3rem;
}

.logo h2{
  color:var(--red);
  font-size:1.4rem;
}

.nav-links{
  display:flex;
  gap:15px;
  align-items:center;
  flex-wrap:wrap;
}

.nav-links a{
  text-decoration:none;
  color:#374151;
  font-weight:600;
  transition:0.3s;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 15px;
  border-radius:40px;
}

.nav-links a:hover{
  color:var(--red);
  background:#ffebee;
}

.nav-links a.active{
  background:var(--red);
  color:white;
}

.cart-badge{
  background:var(--red);
  color:white;
  border-radius:40px;
  padding:2px 8px;
  font-size:0.7rem;
  font-weight:800;
  margin-left:5px;
}

.login-btn{
  background:linear-gradient(135deg,#fff9e6,#fef3c7);
  border:2px solid #f9a825;
  color:#92400e !important;
}

.login-btn .user-avatar{
  width:28px;
  height:28px;
  background:linear-gradient(135deg,#d32f2f,#b71c1c);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-btn .user-avatar i{
  color:white;
  font-size:0.8rem;
}

/* HERO */
.hero{
  margin:30px;
  padding:80px 40px;
  border-radius:30px;
  background:linear-gradient(rgba(255,255,255,0.85),rgba(255,255,255,0.85)),
  url('https://images.unsplash.com/photo-1488459716781-31db52582fe9?w=1400');
  background-size:cover;
  background-position:center;
}

.hero h1{
  font-size:55px;
  line-height:1.2;
  margin-bottom:20px;
}

.hero span{
  color:var(--red);
}

.hero p{
  max-width:600px;
  color:#374151;
  margin-bottom:25px;
}

.hero button{
  background:var(--red);
  color:white;
  border:none;
  padding:14px 30px;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
  display:inline-flex;
  align-items:center;
  gap:10px;
}

.hero button:hover{
  background:#b71c1c;
  transform:scale(1.02);
}

/* OFFERS BAR */
.offers-bar{
  background:linear-gradient(90deg,#d32f2f,#b71c1c);
  border-radius:20px;
  padding:14px 24px;
  margin:0 30px 30px 30px;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  align-items:center;
  justify-content:center;
}

.offer-item{
  color:white;
  font-size:0.88rem;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
}

.offer-item i{
  color:#ffd54f;
}

/* SECTION */
.section{
  padding:20px 30px 50px;
}

.section-title{
  font-size:35px;
  margin-bottom:25px;
}

.section-title span{
  color:var(--red);
}

/* CATEGORIES */
.categories{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:25px;
}

.cat-pill{
  background:white;
  border:2px solid var(--border);
  border-radius:40px;
  padding:8px 20px;
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  display:inline-flex;
  align-items:center;
  gap:8px;
}

.cat-pill:hover, .cat-pill.active{
  background:var(--red);
  color:white;
  border-color:var(--red);
}

/* SEARCH */
.search-wrap{
  position:relative;
  margin-bottom:25px;
  max-width:400px;
}

.search-wrap i{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
}

.search-wrap input{
  width:100%;
  padding:14px 18px 14px 46px;
  border-radius:50px;
  border:2px solid var(--border);
  font-family:'Poppins',sans-serif;
  font-size:0.9rem;
  outline:none;
}

.search-wrap input:focus{
  border-color:var(--red);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:white;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.06);
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 35px rgba(211,47,47,0.12);
}

.card-badge{
  position:absolute;
  top:12px;
  left:12px;
  background:#2e7d32;
  color:white;
  border-radius:8px;
  padding:3px 10px;
  font-size:0.68rem;
  font-weight:700;
  z-index:2;
}

.card-badge.sale{background:#d32f2f;}
.card-badge.organic{background:#2e7d32;}
.card-badge.new{background:#7c3aed;}
.card-badge.best{background:#f9a825;color:#1a1a2e;}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:transform 0.35s;
}

.card:hover img{
  transform:scale(1.05);
}

.card-body{
  padding:18px;
}

.card-cat{
  font-size:0.7rem;
  color:var(--red);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:5px;
}

.card h3{
  margin-bottom:6px;
  font-size:1.05rem;
}

.weight{
  color:var(--muted);
  font-size:0.7rem;
  margin-bottom:8px;
}

.rating{
  display:flex;
  gap:3px;
  align-items:center;
  margin-bottom:10px;
}

.rating i{
  color:#f59e0b;
  font-size:0.7rem;
}

.rating span{
  font-size:0.7rem;
  color:var(--muted);
  margin-left:4px;
}

.price{
  color:var(--red);
  font-size:1.3rem;
  font-weight:800;
  margin-bottom:15px;
  display:flex;
  align-items:center;
  gap:8px;
}

.price-old{
  font-size:0.8rem;
  color:#94a3b8;
  text-decoration:line-through;
  font-weight:400;
}

.btn{
  width:100%;
  border:none;
  background:var(--red);
  color:white;
  padding:12px;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn:hover{
  background:#b71c1c;
  transform:scale(0.98);
}

.btn-outline{
  background:transparent;
  border:2px solid var(--red);
  color:var(--red);
  padding:10px 20px;
  border-radius:50px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.btn-outline:hover{
  background:var(--red);
  color:white;
}

/* DETAIL PAGE */
.detail-container{
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  background:white;
  border-radius:32px;
  padding:36px;
  margin:30px;
}

.detail-img{flex:1;min-width:240px;}
.detail-img img{width:100%;border-radius:24px;max-height:350px;object-fit:cover;}
.detail-info{flex:2;}

/* CART TABLE */
.cart-table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:24px;
  overflow:hidden;
}

.cart-table th{
  background:var(--red);
  color:white;
  padding:14px 18px;
  font-weight:600;
  text-align:left;
}

.cart-table td{
  padding:16px 18px;
  border-bottom:1px solid var(--border);
}

.qty-controls{
  display:flex;
  align-items:center;
  gap:10px;
}

.qty-btn{
  width:30px;
  height:30px;
  border:2px solid var(--border);
  background:white;
  border-radius:50%;
  cursor:pointer;
  font-weight:700;
}

/* CHECKOUT */
.checkout-grid{
  display:flex;
  flex-wrap:wrap;
  gap:28px;
  margin:30px;
}

.form-card{
  flex:2;
  background:white;
  border-radius:28px;
  padding:32px;
}

.order-summary{
  flex:1.2;
  background:white;
  border-radius:28px;
  padding:28px;
}

.form-group input{
  width:100%;
  padding:12px 16px;
  border-radius:16px;
  border:2px solid var(--border);
  margin-bottom:16px;
  font-family:'Poppins',sans-serif;
}

/* TOAST */
.toast-msg{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  color:white;
  padding:12px 24px;
  border-radius:60px;
  z-index:1000;
  display:flex;
  align-items:center;
  gap:10px;
  animation:fadeUp 0.25s ease;
  pointer-events:none;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateX(-50%) translateY(20px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}

/* FOOTER WITH PAYMENT ICONS */
footer{
  background:#111827;
  color:white;
  text-align:center;
  padding:40px 30px;
  margin-top:50px;
}

footer h2{
  color:#ff8a65;
  margin-bottom:10px;
}

footer p{
  color:#d1d5db;
}

.payment-icons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px 0;
}

.payment-icons i{
  font-size:2.2rem;
  color:#cbd5e1;
  transition:0.2s;
}

.payment-icons i:hover{
  color:#ff8a65;
  transform:scale(1.05);
}

.social-icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
}

.social-icons a{
  background:#2d2d44;
  width:38px;
  height:38px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  color:#cbd5e1;
  transition:0.2s;
  text-decoration:none;
}

.social-icons a:hover{
  background:var(--red);
  color:white;
}

@media(max-width:768px){
  .hero{
    padding:50px 25px;
    margin:20px;
  }
  .hero h1{
    font-size:38px;
  }
  .navbar{
    flex-direction:column;
  }
  .offers-bar{
    margin:0 20px 20px 20px;
  }
  .section{
    padding:20px;
  }
  .checkout-grid{
    margin:20px;
  }
  .detail-container{
    margin:20px;
    padding:24px;
  }
}
</style>
</head>

  { id:27, name:"Frozen Pizza",       category:"Frozen",     price:5.49, oldPrice:null,  unit:"350g",    rating:4.4, reviews:103, badge:null,      desc:"Margherita pizza.",                            image:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400&h=280&fit=crop" },
  { id:28, name:"Mixed Vegetables",   category:"Frozen",     price:3.49, oldPrice:null,  unit:"500g",    rating:4.5, reviews:58,  badge:"new",     desc:"Frozen mixed veg.",                            image:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&h=280&fit=crop" },
  { id:29, name:"Fresh Salmon",       category:"Seafood",    price:12.99,oldPrice:15.99, unit:"300g",    rating:4.8, reviews:76,  badge:"sale",    desc:"Atlantic salmon fillet.",                      image:"https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=400&h=280&fit=crop" }
];

let cart = JSON.parse(localStorage.getItem('araliya_cart')) || [];
let currentUser = JSON.parse(localStorage.getItem('araliya_user')) || null;
let activePage = "home";
let selectedProductId = null;
let activeCategory = "all";

function saveCart() { localStorage.setItem('araliya_cart', JSON.stringify(cart)); updateCartBadge(); }
function updateCartBadge() { const total = cart.reduce((s,i)=>s+i.quantity,0); const b=document.getElementById('cartCountBadge'); if(b) b.innerText=total; }
function showToast(msg) { const t=document.createElement('div'); t.className='toast-msg'; t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),2400); }
function addToCart(id) { const p=products.find(p=>p.id==id); if(!p) return; const ex=cart.find(i=>i.id==id); if(ex) ex.quantity+=1; else cart.push({id:p.id,name:p.name,price:p.price,quantity:1,image:p.image}); saveCart(); showToast(`${p.name} added`); renderCurrentPage(); }
function updateQty(id,delta) { const idx=cart.findIndex(i=>i.id==id); if(idx!==-1){ const q=cart[idx].quantity+delta; if(q<=0) cart.splice(idx,1); else cart[idx].quantity=q; saveCart(); renderCurrentPage(); } }
function getTotal() { return cart.reduce((s,i)=>s+(i.price*i.quantity),0).toFixed(2); }
function starHTML(r) { let s=''; for(let i=1;i<=5;i++) s+=`<i class="fas fa-star" style="color:${i<=Math.round(r)?'#f59e0b':'#e2e8f0'};"></i>`; return s; }
function badgeHTML(b) { if(!b) return ''; const map={organic:'🌿 Organic',sale:'🔥 Sale',new:'✨ New',best:'⭐ Best'}; return `<div class="card-badge ${b}">${map[b]||b}</div>`; }

function setPage(page,pid=null) { activePage=page; if(pid) selectedProductId=pid; activeCategory="all"; renderCurrentPage(); document.querySelectorAll('.nav-item').forEach(l=>{ l.classList.toggle('active', l.getAttribute('data-page')===page); }); window.scrollTo({top:0,behavior:'smooth'}); }

function renderCurrentPage() {
  const div=document.getElementById('pageContent'); if(!div) return;
  if(activePage==='home') div.innerHTML=renderHome();
  else if(activePage==='shop') div.innerHTML=renderShop();
  else if(activePage==='offers') div.innerHTML=renderOffers();
  else if(activePage==='details') div.innerHTML=renderDetails(selectedProductId);
  else if(activePage==='cart') div.innerHTML=renderCart();
  else if(activePage==='checkout') div.innerHTML=renderCheckout();
  else if(activePage==='login') div.innerHTML=renderLogin();
  attachEvents();
}

function renderHome() {
  const featured = products.slice(0,8);
  return `
  <div class="hero">
    <h1>Fresh Food From <span>Sri Lanka's Best Market</span></h1>
    <p>Shop fresh fruits, vegetables, bakery items, seafood, snacks, and groceries with premium quality and fast delivery.</p>
    <button id="exploreShopBtn"><i class="fas fa-cart-shopping"></i> Shop Now</button>
  </div>
  <div class="offers-bar">
    <div class="offer-item"><i class="fas fa-percentage"></i> 20% off Dairy today!</div>
    <div class="offer-item"><i class="fas fa-truck"></i> Free delivery over $30</div>
    <div class="offer-item"><i class="fas fa-gift"></i> Buy 2 Get 1 Free on Snacks</div>
  </div>
  <div class="section">
    <h2 class="section-title">Fresh <span>Products</span></h2>
    <div class="grid">${featured.map(p=>productCard(p)).join('')}</div>
  </div>`;
}

function renderShop() {
  const cats = ["all", ...new Set(products.map(p=>p.category))];
  const filtered = activeCategory==="all" ? products : products.filter(p=>p.category===activeCategory);
  return `<div class="section">
    <h2 class="section-title">All <span>Products</span> <span style="font-size:1rem;">(${products.length} items)</span></h2>
    <div class="categories">${cats.map(c=>`<div class="cat-pill ${activeCategory===c?'active':''}" data-cat="${c}">${c==='all'?'🍎 All Products':c}</div>`).join('')}</div>
    <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="shopSearch" placeholder="Search food items..."></div>
    <div class="grid" id="shopGrid">${filtered.map(p=>productCard(p)).join('')}</div>
  </div>`;
}

function renderOffers() {
  const sale = products.filter(p=>p.oldPrice);
  return `<div class="section"><h2 class="section-title">🔥 <span>Hot Deals</span></h2><div class="grid">${sale.map(p=>productCard(p)).join('')}</div></div>`;
}

function productCard(p) {
  const savings = p.oldPrice ? ((p.oldPrice-p.price)/p.oldPrice*100).toFixed(0) : null;
  return `
  <div class="card" data-name="${p.name.toLowerCase()}">
    ${badgeHTML(p.badge)}
    ${savings ? `<div style="position:absolute;top:12px;right:12px;background:#2e7d32;color:white;border-radius:8px;padding:3px 9px;font-size:0.7rem;font-weight:800;">-${savings}%</div>` : ''}
    <img src="${p.image}" onerror="this.src='https://placehold.co/400x280?text=${encodeURIComponent(p.name)}'">
    <div class="card-body">
      <div class="card-cat">${p.category}</div>
      <h3>${p.name}</h3>
      <div class="weight">${p.unit}</div>
      <div class="rating">${starHTML(p.rating)}<span>${p.rating} (${p.reviews})</span></div>
      <div class="price"><span>$${p.price}</span>${p.oldPrice?`<span class="price-old">$${p.oldPrice}</span>`:''}</div>
      <button class="btn add-cart-btn" data-id="${p.id}"><i class="fas fa-cart-plus"></i> Add To Cart</button>
    </div>
  </div>`;
}

function renderDetails(id) {
  const p=products.find(p=>p.id==id); if(!p) return `<div class="section"><h1>Not found</h1></div>`;
  return `<div class="detail-container">
    <div class="detail-img"><img src="${p.image}" onerror="this.src='https://placehold.co/400x350?text=${encodeURIComponent(p.name)}'"></div>
    <div class="detail-info">
      <div class="card-cat">${p.category}</div>
      <h1>${p.name}</h1>
      <div class="weight">${p.unit}</div>
      <div class="rating" style="margin:10px 0;">${starHTML(p.rating)}<span>${p.rating} (${p.reviews} reviews)</span></div>
      <div class="price" style="font-size:1.8rem;">$${p.price}${p.oldPrice?`<span class="price-old">$${p.oldPrice}</span>`:''}</div>
      <p>${p.desc}</p>
      <div style="margin-top:25px;display:flex;gap:12px;">
        <button class="btn add-cart-btn" data-id="${p.id}" style="width:auto;padding:12px 25px;"><i class="fas fa-cart-shopping"></i> Add to Cart</button>
        <button class="btn-outline" id="backToShopBtn">← Back to Shop</button>
      </div>
    </div>
  </div>`;
}

function renderCart() {
  if(!cart.length) return `<div class="section" style="text-align:center;padding:80px;"><i class="fas fa-shopping-bag fa-3x" style="color:#cbd5e1;"></i><h3 style="margin:15px 0;">Cart is empty</h3><button class="btn" id="continueShopBtn" style="width:auto;margin:0 auto;">Start Shopping</button></div>`;
  return `<div class="section"><h2 class="section-title">🛒 Your <span>Cart</span></h2>
  <table class="cart-table"><thead><tr><th>Item</th><th>Name</th><th>Price</th><th>Quantity</th><th>Total</th><th></th></tr></thead><tbody>
    ${cart.map(i=>`<tr><td style="width:70px;"><img src="${i.image}" style="width:55px;height:55px;object-fit:cover;border-radius:12px;"></td><td><strong>${i.name}</strong></td><td>$${i.price}</td><td><div class="qty-controls"><button class="qty-btn qty-dec" data-id="${i.id}">-</button><span>${i.quantity}</span><button class="qty-btn qty-inc" data-id="${i.id}">+</button></div></td><td>$${(i.price*i.quantity).toFixed(2)}</td><td><button class="remove-item" data-id="${i.id}" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:1.1rem;"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
  </tbody></table>
  <div style="display:flex;justify-content:flex-end;gap:15px;margin-top:25px;"><button class="btn-outline" id="continueShopBtn">Continue Shopping</button><button class="btn" id="proceedCheckoutBtn">Checkout - $${getTotal()}</button></div></div>`;
}

function renderCheckout() {
  if(!cart.length) return `<div class="section" style="text-align:center;"><button class="btn" id="continueShopBtn">Shop First</button></div>`;
  const sub=parseFloat(getTotal()), delivery=sub>=30?0:3.99, total=(sub+delivery).toFixed(2);
  return `<div class="checkout-grid"><div class="form-card"><h3><i class="fas fa-map-marker-alt" style="color:var(--red);"></i> Delivery Details</h3><input type="text" id="fullname" placeholder="Full name" value="${currentUser?currentUser.name:''}"><input type="email" id="email" placeholder="Email"><input type="text" id="address" placeholder="Delivery address"><input type="text" id="phone" placeholder="Phone"><button id="placeOrderBtn" class="btn" style="width:100%;">Place Order - $${total}</button></div><div class="order-summary"><h3>Order Summary</h3>${cart.map(i=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #edf2f7;"><span>${i.name} x${i.quantity}</span><span>$${(i.price*i.quantity).toFixed(2)}</span></div>`).join('')}<hr><div style="display:flex;justify-content:space-between;font-weight:800;margin-top:12px;"><span>Total</span><span>$${total}</span></div></div></div>`;
}

function renderLogin() {
  if(currentUser) return `<div class="section" style="text-align:center;padding:60px;"><div style="width:80px;height:80px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;"><i class="fas fa-user fa-3x" style="color:white;"></i></div><h2>Welcome, ${currentUser.name}!</h2><p style="margin:10px 0;">${currentUser.email}</p><button id="logoutBtn" class="btn" style="width:auto;margin:20px auto;">Logout</button></div>`;
  return `<div class="section"><div style="max-width:450px;margin:40px auto;background:white;border-radius:28px;padding:40px;text-align:center;"><i class="fas fa-users fa-3x" style="color:var(--red);margin-bottom:15px;"></i><h2>Sign In</h2><input type="text" id="loginName" placeholder="Full name" style="width:100%;padding:12px;margin:10px 0;border-radius:16px;border:2px solid #edf2f7;"><input type="email" id="loginEmail" placeholder="Email" style="width:100%;padding:12px;margin:10px 0;border-radius:16px;border:2px solid #edf2f7;"><button id="mockLoginBtn" class="btn" style="width:100%;">Join Araliya</button><p style="margin-top:12px;">Demo: any name works</p></div></div>`;
}

function attachEvents() {
  document.querySelectorAll('.add-cart-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();addToCart(parseInt(b.dataset.id));}));
  document.querySelectorAll('.qty-inc').forEach(b=>b.addEventListener('click',()=>updateQty(parseInt(b.dataset.id),1)));
  document.querySelectorAll('.qty-dec').forEach(b=>b.addEventListener('click',()=>updateQty(parseInt(b.dataset.id),-1)));
  document.querySelectorAll('.remove-item').forEach(b=>b.addEventListener('click',()=>{cart=cart.filter(i=>i.id!=parseInt(b.dataset.id));saveCart();showToast('Removed');renderCurrentPage();}));
  document.querySelectorAll('.cat-pill').forEach(p=>p.addEventListener('click',()=>{activeCategory=p.dataset.cat;renderCurrentPage();}));
  const search=document.getElementById('shopSearch'); if(search) search.addEventListener('input',e=>{const v=e.target.value.toLowerCase();document.querySelectorAll('#shopGrid .card').forEach(c=>{c.style.display=c.dataset.name?.includes(v)?'':'none';});});
  const s=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',fn);};
  s('exploreShopBtn',()=>setPage('shop')); s('backToShopBtn',()=>setPage('shop')); s('continueShopBtn',()=>setPage('shop'));
  s('proceedCheckoutBtn',()=>setPage('checkout'));
  s('placeOrderBtn',()=>{if(!cart.length){showToast('Cart empty');return;}showToast('🎉 Order placed! Thank you for shopping at Araliya!');cart=[];saveCart();setPage('home');});
  s('mockLoginBtn',()=>{const name=document.getElementById('loginName')?.value||'Araliya Customer';const email=document.getElementById('loginEmail')?.value||'customer@araliya.lk';currentUser={name,email};localStorage.setItem('araliya_user',JSON.stringify(currentUser));showToast(`Welcome ${name}!`);setPage('home');});
  s('logoutBtn',()=>{currentUser=null;localStorage.removeItem('araliya_user');showToast('Logged out');setPage('home');});
}

function init(){ document.querySelectorAll('.nav-item').forEach(l=>l.addEventListener('click',e=>{e.preventDefault();setPage(l.getAttribute('data-page'));})); setPage('home'); updateCartBadge(); }
init();
</script>
</body>
</html>
